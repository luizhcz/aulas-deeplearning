# =============================================================================
# Configuração padrão da biblioteca spacy-intent
#
# Para customizar, copie este arquivo e passe o caminho ao criar o engine:
#   engine = IntentEngine.from_config("meu_config.yml")
# Ou defina a variável de ambiente:
#   SPACY_INTENT_CONFIG=/caminho/para/config.yml
# =============================================================================

spacy_model: pt_core_news_sm

preprocessing:
  steps:
    - strip_whitespace
    - normalize_unicode
    - collapse_whitespace

thresholds:
  min_action_confidence: 0.70

# =============================================================================
# Coleta de dados para treinamento ML (desabilitada por padrão)
#
# Quando enabled: true, cada classificação é gravada em Postgres em background
# sem impacto na performance. Execute a migração antes de habilitar:
#   psql $DATABASE_URL -f spacy_intent/infrastructure/migrations/001_create_training_records.sql
#
# database_url pode ser omitido se a variável de ambiente
# SPACY_INTENT_DATABASE_URL ou DATABASE_URL estiver definida.
# =============================================================================
training:
  enabled: false
  # database_url: postgresql://user:pass@localhost:5432/mydb
  queue_size: 1000   # registros em memória antes de descartar (nunca bloqueia)
  pool_size: 2       # conexões no pool Postgres

intents:
  - name: buy_stock
    action:
      type: BUY_STOCK
      description: "Executar ordem de compra de ação"
    confidence:
      phrase: 0.92
      lemma: 0.75
    patterns:
      phrases:
        - "quero comprar"
        - "desejo comprar"
        - "vou comprar"
        - "preciso comprar"
        - "gostaria de comprar"
        - "quero adquirir"
        - "desejo adquirir"
        - "quero investir em"
        - "comprar ação"
        - "comprar ações"
        - "realizar uma compra"
        - "efetuar uma compra"
        - "ordem de compra"
        - "entrada na ação"
      lemmas:
        - comprar
        - adquirir
        - investir

  - name: sell_stock
    action:
      type: SELL_STOCK
      description: "Executar ordem de venda de ação"
    confidence:
      phrase: 0.92
      lemma: 0.75
    patterns:
      phrases:
        - "quero vender"
        - "desejo vender"
        - "vou vender"
        - "preciso vender"
        - "gostaria de vender"
        - "quero me desfazer"
        - "vender ação"
        - "vender ações"
        - "realizar uma venda"
        - "efetuar uma venda"
        - "ordem de venda"
        - "saída da ação"
        - "me desfazer de"
      lemmas:
        - vender
        - alienar
